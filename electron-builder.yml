appId: com.herma.app
productName: Herma
directories:
  buildResources: build
extraResources:
  - from: build/icon.png
    to: icon.png
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,package-lock.json,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
win:
  executableName: herma
  target:
    - nsis
nsis:
  artifactName: herma-${version}-setup.${ext}
  shortcutName: Herma
  uninstallDisplayName: Herma
  createDesktopShortcut: always
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  notarize: false
dmg:
  artifactName: herma-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: Herma
appImage:
  artifactName: herma-${version}.${ext}
npmRebuild: false
